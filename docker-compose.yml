version: '3'

services:
  server:
    image: afg-server:2.0
    container_name: afg-server
    build:
      context: ./server
      dockerfile: Dockerfile.server
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - PORT=5000
    ports:
      - 5000:5000
    depends_on:
      - db
    restart: always

  client:
    image: afg-client
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: afg-client-docker
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - 5173:5173
    restart: always

  db:
    image: postgres
    restart: always
    container_name: afg-db
    ports:
      - '5433:5432' # !!! 5433 for  docker db
    env_file: .env
    environment:
      PG_DATA: /var/lib/postgresql/data
    volumes:
      - pgdata:/var/lib/postgresql/data

networks:
  net:
    driver: bridge

volumes:
  pgdata:
