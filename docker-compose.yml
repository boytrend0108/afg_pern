version: '3'

services:
  server:
    image: afg-server:2.0
    build:
      context: ./server
      dockerfile: Dockerfile.server
    container_name: afg-server
    ports:
      - 5000:5000
    depends_on:
      - db

  client:
    image: afg-multi
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: afg-client
    ports:
      - 5173:5173
    restart: unless-stopped

  db:
    image: postgres
    container_name: AFG_DB
    ports:
      - '5433:5432' # !!! 5433 for  docker db
    env_file: .env

networks:
  net:
    driver: bridge
